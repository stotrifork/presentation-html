<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hikes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap">
  <style>
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
    :root {
      --gd: #1b2e1b; --gm: #2d4a2d; --gl: #4a7a4a;
      --mu: #8ab88a; --sand: #f7f2eb; --txt: #1c1c1c; --mut: #607060;
      --rule: #e4ece4;
    }
    body { font-family: 'Inter', sans-serif; background: #ddd8d0; color: var(--txt); font-size: 14px; line-height: 1.65; padding: 32px 16px 64px }

    header { max-width: 560px; margin: 0 auto 28px; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gd); line-height: 1 }
    header p  { color: var(--mut); margin-top: 6px; font-size: 13px }

    .grid { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px }

    @media (min-width: 700px) {
      body   { padding: 48px 32px 80px }
      header { max-width: 960px; margin-bottom: 32px }
      header h1 { font-size: 40px }
      .grid  { max-width: 960px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px }
    }
    @media (min-width: 1100px) {
      .grid { grid-template-columns: 1fr 1fr 1fr }
    }

    .card {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      text-decoration: none; color: inherit;
      display: flex; align-items: stretch;
      transition: transform .15s, box-shadow .15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.14) }

    .card-stripe {
      width: 6px; flex-shrink: 0;
    }
    .stripe-upcoming { background: linear-gradient(180deg, var(--gm), #3d6040) }
    .stripe-planned  { background: linear-gradient(180deg, #4a6aaa, #6a8aaa) }
    .stripe-done     { background: #bbb }

    .card-body { padding: 14px 16px; flex: 1 }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px }
    .card-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gd); line-height: 1.2 }
    .badge {
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; flex-shrink: 0; margin-top: 2px;
    }
    .badge-upcoming { background: #d1e7dd; color: #0a5e36 }
    .badge-planned  { background: #dde3f0; color: #2a3a6a }
    .badge-done     { background: #e9e9e9; color: #555 }

    .card-meta { font-size: 12px; color: var(--mut); margin-bottom: 8px }

    .tags { display: flex; flex-wrap: wrap; gap: 5px }
    .tag  { font-size: 11px; background: #eaf3ea; color: #3a6347; padding: 2px 8px; border-radius: 20px; font-weight: 500 }

    .card-arrow { display: flex; align-items: center; padding: 0 16px; color: var(--mu); font-size: 18px; flex-shrink: 0 }
  </style>
</head>
<body>

<header>
  <h1>Hikes</h1>
  <p>Planned routes, itineraries, and trail notes</p>
</header>

<div class="grid" id="grid"></div>

<script>
const HIKES = [
  {
    title:  "Malerweg · Etape 1–3",
    region: "Sächsische Schweiz, Sachsen",
    meta:   "3 vandredage · ~43 km · ~1 300 hm stigning · april 2025",
    status: "upcoming",
    tags:   ["Sandsten", "Hotel-til-hotel", "Moderat"],
    url:    "malerweg-1-2-3/index.html",
  },
  {
    title:  "Malerweg · Etape 1–3 #2",
    region: "Sächsische Schweiz, Sachsen",
    meta:   "3 vandredage · ~43 km · ~1 300 hm stigning · april 2025",
    status: "upcoming",
    tags:   ["Sandsten", "Hotel-til-hotel", "Moderat"],
    url:    "malerweg-option2/index.html",
  },
  {
    title:  "Sächsische Schweiz",
    region: "Sachsen, Tyskland",
    meta:   "5 dage · 3 etaper · ~45 km vandring · april 2025",
    status: "done",
    tags:   ["Sandsten", "Hotel-til-hotel", "Moderat"],
    url:    "sachsische-schweiz/index.html",
  },
  {
    title:  "Zugspitze Circuit",
    region: "Bayern, Tyskland",
    meta:   "4 dage · ~60 km · ~4 200 m stigning",
    status: "upcoming",
    tags:   ["Alper", "Hut-to-hut", "Krævende"],
    url:    "zugspitze/index.html",
  },
  {
    title:  "Camino Primitivo",
    region: "Asturien, Spanien",
    meta:   "14 dage · ~320 km",
    status: "planned",
    tags:   ["Pilgrimsrute", "Langdistance", "Moderat"],
    url:    null,
  },
  {
    title:  "Kungsleden — Abisko til Kebnekaise",
    region: "Svensk Lapland",
    meta:   "7 dage · ~110 km",
    status: "planned",
    tags:   ["Arktis", "Vildmark", "Moderat"],
    url:    null,
  },
  {
    title:  "Dolomitterne Alta Via 1",
    region: "Sydtyrol, Italien",
    meta:   "8 dage · ~120 km",
    status: "done",
    tags:   ["Alper", "Scenisk", "Krævende"],
    url:    null,
  },
];

const LABELS = { upcoming: "Kommende", planned: "Planlagt", done: "Gennemført" };

const grid = document.getElementById("grid");
HIKES.forEach(h => {
  const tag   = h.url ? "a" : "div";
  const attrs = h.url ? `href="${h.url}"` : "";
  grid.insertAdjacentHTML("beforeend", `
    <${tag} class="card" ${attrs}>
      <div class="card-stripe stripe-${h.status}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${h.title}</div>
          <span class="badge badge-${h.status}">${LABELS[h.status]}</span>
        </div>
        <div class="card-meta">${h.region} · ${h.meta}</div>
        <div class="tags">${h.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      </div>
      ${h.url ? '<div class="card-arrow">›</div>' : ""}
    </${tag}>`);
});
</script>

</body>
</html>
